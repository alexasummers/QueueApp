<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Queue Tracker Pro</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
      text-align: center;
    }

    h1 { margin-bottom: 10px; }

    #status {
      font-size: 18px;
      margin-bottom: 10px;
    }

    #summary {
      font-size: 16px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .button-container {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 18px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
    }

    .a { background: #007bff; }
    .b { background: #28a745; }
    .done { background: #ff9800; }

    #log {
      background: white;
      border-radius: 12px;
      padding: 15px;
      max-width: 600px;
      margin: auto;
      text-align: left;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      max-height: 60vh;
      overflow-y: auto;
    }

    .entry {
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>Queue Tracker Pro</h1>

<div id="status">Current Queue: None</div>
<div id="summary">No active session</div>

<div class="button-container">
  <button class="a" onclick="switchQueue('A')">Queue A</button>
  <button class="b" onclick="switchQueue('B')">Queue B</button>
  <button class="done" onclick="markDone()">Done!</button>
</div>

<div id="log"></div>

<script>
  let currentQueue = null;

  let sessionStart = null;
  let sessionDoneCount = 0;

  let queueStats = {
    A: { done: 0, totalTime: 0 },
    B: { done: 0, totalTime: 0 }
  };

  function switchQueue(queue) {
    const now = Date.now();

    // close previous session
    if (currentQueue && sessionStart) {
      const duration = Math.round((now - sessionStart) / 1000);

      queueStats[currentQueue].totalTime += duration;

      const entry = document.createElement("div");
      entry.className = "entry";
      entry.textContent =
        `Session closed: Queue ${currentQueue} | Time: ${duration}s | Done in session: ${sessionDoneCount}`;

      document.getElementById("log").prepend(entry);
    }

    // switch to new queue
    currentQueue = queue;
    sessionStart = now;
    sessionDoneCount = 0;

    document.getElementById("status").textContent =
      `Current Queue: ${queue}`;

    updateSummary();
  }

  function markDone() {
    if (!currentQueue) {
      alert("Select a queue first");
      return;
    }

    const now = new Date().toLocaleString();

    queueStats[currentQueue].done++;
    sessionDoneCount++;

    const entry = document.createElement("div");
    entry.className = "entry";
    entry.textContent =
      `DONE → Queue ${currentQueue} at ${now}`;

    document.getElementById("log").prepend(entry);

    updateSummary();
  }

  function updateSummary() {
    document.getElementById("summary").textContent =
      `A Done: ${queueStats.A.done} | B Done: ${queueStats.B.done} | ` +
      `Session Done: ${sessionDoneCount}`;
  }
</script>

</body>
</html>
